apiVersion: kueue.openshift.io/v1
kind: Kueue
metadata:
  labels:
    app.kubernetes.io/name: kueue-operator
    app.kubernetes.io/managed-by: kustomize
  name: cluster
  namespace: openshift-kueue-operator
spec:
  managementState: Managed
  config:
    preemption:
      preemptionPolicy: FairSharing
    resources:
      deviceClassMappings:
      - name: gpu
        deviceClassNames:
        - gpu.example.com
      - name: gpu-late-dc
        deviceClassNames:
        - gpu-late-dc.example.com
    integrations:
      frameworks:
      - BatchJob
      - Pod
      - Deployment
      - StatefulSet
      - JobSet
      - LeaderWorkerSet
